    color: #1a1a2e; background: #ffffff; text-align: center; padding: 2rem;

  a.btn { display: inline-block; margin: .4rem; padding: .7rem 1.4rem; border-radius: 12px; background: #4f46e5; color: #fff; text-decoration: none; font-weight: 600; }
  a.btn.secondary { background: transparent; color: #4f46e5; border: 1px solid #4f46e5; }
  @media (prefers-color-scheme: dark) { body { color: #e6e6f0; background: #0b0b12; } }

<main>
  <div class="brand"><span class="mark"></span>Worthia</div>
  <p>Legal documents</p>
  <div>
    <a class="btn" href="./privacy.html">Privacy Policy</a>
